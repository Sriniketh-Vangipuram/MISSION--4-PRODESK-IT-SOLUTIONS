<!DOCTYPE html>
<html>
<head>
  <title>AI Cover Letter Generator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="container">
  <h1>AI Cover Letter Generator</h1>

  <input id="name" placeholder="Your Name">
  <input id="role" placeholder="Job Role">
  <input id="company" placeholder="Company Name">
  <textarea id="skills" placeholder="Your Skills"></textarea>

  <select id="tone">
    <option value="formal">Formal</option>
    <option value="friendly">Friendly</option>
  </select>

  <button onclick="generate()">Generate</button>

  <div id="loading" class="hidden">Generating...</div>

  <textarea id="output" placeholder="Your cover letter appears here"></textarea>
</div>

<script src="script.js"></script>
</body>
</html>
